services:
  steamcord:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: steam-cord
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_started
    ports:
      - "8081:8080"
    restart: unless-stopped
    env_file:
      - .env.docker

  postgres:
    image: postgres:17
    container_name: postgres-steamcord
    restart: unless-stopped
    environment:
      - POSTGRES_DB=first
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=123456
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d first"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8
    container_name: redis-steamcord
    restart: unless-stopped
    volumes:
      - "redis_data:/data"

  migrate:
    build:
      context: .
      dockerfile: Dockerfile.migrate
    env_file:
      - .env.docker
    command: >
      database update -p SteamCord.Infrastructure -s SteamCord.Bot
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
